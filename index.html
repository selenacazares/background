<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dossier — Selena Cazares</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    font-family: "Georgia", serif;
    color: #eaeaea;
    overflow: hidden;
}

/* INTRO */
.intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: fadeOut 1.5s ease forwards;
    animation-delay: 1.5s;
}

.intro-text {
    color: #8b0000;
    font-size: 22px;
    letter-spacing: 3px;
    animation: flicker 1.5s infinite;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

@keyframes flicker {
    0%,100% {opacity:1;}
    50% {opacity:0.6;}
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: 60px auto;
    padding: 50px;
    background: rgba(15,15,15,0.95);
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
    position: relative;
}

/* TITRE + GLITCH */
h1 {
    text-align: left;
    margin-right: 320px;
    border-bottom: 1px solid rgba(139,0,0,0.4);
    padding-bottom: 10px;
    letter-spacing: 4px;
}

.glitch {
    position: relative;
}

.glitch::before,
.glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    width: 100%;
    opacity: 0.15;
}

.glitch::before {
    color: #8b0000;
    animation: glitchTop 3s infinite;
}

.glitch::after {
    color: #ff0000;
    animation: glitchBottom 3s infinite;
}

@keyframes glitchTop {
    0% { transform: translate(-2px, -1px); }
    50% { transform: translate(2px, 1px); }
    100% { transform: translate(0); }
}

@keyframes glitchBottom {
    0% { transform: translate(2px, 1px); }
    50% { transform: translate(-2px, -1px); }
    100% { transform: translate(0); }
}

/* PROFIL */
.profile-card {
    position: absolute;
    top: 50px;
    right: 50px;
    width: 260px;
    background: rgba(5,5,5,0.95);
    border: 1px solid #8b0000;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 0 20px rgba(139,0,0,0.2);
    z-index: 2;
}

.profile-card img {
    width: 100%;
    border-radius: 8px;
    filter: grayscale(100%) contrast(120%);
}

.profile-card h3 {
    color: #8b0000;
}

.profile-card p {
    font-size: 13px;
    color: #bbb;
}

.profile-desc {
    font-style: italic;
    color: #aaa;
}

/* 🔴 TAMPON CONFIDENTIEL */
.stamp {
    position: absolute;
    top: 300px;
    right: 20px;

    font-size: 30px;
    font-weight: bold;
    letter-spacing: 4px;

    color: rgba(139,0,0,0.12);

    transform: rotate(-15deg);

    border: 2px solid rgba(139,0,0,0.2);
    padding: 12px 25px;

    text-transform: uppercase;

    text-shadow:
        0 1px 0 rgba(255,255,255,0.05),
        0 -1px 2px rgba(0,0,0,0.8);

    box-shadow:
        inset 0 2px 6px rgba(139,0,0,0.15),
        inset 0 -2px 6px rgba(0,0,0,0.8);

    pointer-events: none;
    z-index: 1;
}

/* TITRES */
h2 {
    color: #8b0000;
    border-left: 3px solid #8b0000;
    padding-left: 10px;

    opacity: 0;
    transform: translateX(-60px);
    animation: slideInLeft 0.9s ease forwards;
}

/* DELAYS */
.section:nth-of-type(1) h2 { animation-delay: 2.5s; }
.section:nth-of-type(2) h2 { animation-delay: 3.2s; }
.section:nth-of-type(3) h2 { animation-delay: 3.9s; }
.section:nth-of-type(4) h2 { animation-delay: 4.6s; }

@keyframes slideInLeft {
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* TEXTE */
p {
    max-width: 650px;
    line-height: 1.8;
}

/* FOOTER */
.signature {
    margin-top: 100px;
    padding: 25px;
    text-align: center;
    font-size: 14px;
    letter-spacing: 1.5px;

    color: #8b0000;

    border-top: 1px solid rgba(139,0,0,0.3);

    text-shadow:
        0 1px 0 rgba(255,255,255,0.1),
        0 -2px 3px rgba(0,0,0,0.9);

    box-shadow:
        inset 0 2px 8px rgba(139,0,0,0.15),
        inset 0 -2px 8px rgba(0,0,0,0.9);
}
</style>
</head>

<body>

<div class="intro">
    <div class="intro-text">ACCESSING FILE... PLEASE WAIT...</div>
</div>

<div class="container">

<div class="profile-card">
    <img src="selena.png">
    <h3>Selena Cazares</h3>
    <p><strong>Naissance :</strong> 11 Novembre 1990</p>
    <p><strong>Lieu :</strong> Bogotá, Colombie</p>
    <p><strong>Profession :</strong> Agent SAS</p>

    <div class="profile-desc">
        Discrète. Stratégique.
    </div>
</div>

<!-- ✅ TAMPON BIEN PLACÉ -->
<div class="stamp">CONFIDENTIEL</div>

<h1 class="glitch" data-text="Dossier — Selena Cazares">
Dossier — Selena Cazares
</h1>

<div class="section">
<h2>Ses origines</h2>
<p>...</p>
</div>

<footer class="signature">
Selena Cazares ®<br>
Tous droits réservés
</footer>

</div>

<script>
setTimeout(() => {
    document.body.style.overflow = "auto";
}, 1600);
</script>

</body>
</html>
